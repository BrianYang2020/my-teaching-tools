<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課堂小組競賽加分系統</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --primary-dark: #3730a3;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white; padding: 20px 24px; text-align: center;
      box-shadow: 0 2px 12px rgba(79,70,229,.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: .5px; }
    header p { font-size: .85rem; opacity: .8; margin-top: 4px; }

    /* Tabs */
    .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .tab-btn {
      flex: 1; padding: 14px 8px; border: none; background: none; cursor: pointer;
      font-size: .95rem; font-weight: 600; color: var(--text-muted); transition: all .2s;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); background: var(--bg); }

    /* Content */
    .content { padding: 20px 16px; max-width: 800px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title span { font-size: 1.2rem; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    input[type=text], input[type=number], select, textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: .95rem; outline: none; transition: border-color .2s; background: white;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 70px; font-family: inherit; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { filter: brightness(1.1); }
    .btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-outline:hover { background: #eef2ff; }
    .btn-sm { padding: 6px 12px; font-size: .82rem; }
    .btn-full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    /* Group builder */
    .group-item {
      border: 1.5px solid var(--border); border-radius: 10px; padding: 14px;
      margin-bottom: 10px; background: #fafafa; position: relative;
    }
    .group-item .group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .group-num {
      width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
      color: white; font-size: .8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .group-item input[type=text] { flex: 1; }
    .remove-group { margin-left: auto; }

    /* Score quick buttons */
    .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
    .score-quick-btn {
      padding: 12px; border: 2px solid var(--border); border-radius: 10px;
      background: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .score-quick-btn:hover { border-color: var(--primary); color: var(--primary); background: #eef2ff; }
    .score-quick-btn.selected { border-color: var(--primary); background: var(--primary); color: white; }

    /* Group selector */
    .group-selector { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .group-select-btn {
      padding: 8px 18px; border: 2px solid var(--border); border-radius: 20px;
      background: white; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .group-select-btn:hover { border-color: var(--primary); color: var(--primary); }
    .group-select-btn.selected { border-color: var(--primary); background: var(--primary); color: white; }

    /* Leaderboard */
    .rank-card {
      border-radius: 12px; padding: 16px 20px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
      background: white; box-shadow: var(--shadow); transition: transform .2s;
    }
    .rank-card:hover { transform: translateY(-2px); }
    .rank-badge {
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: white; }
    .rank-2 { background: linear-gradient(135deg, #c0c0c0, #9e9e9e); color: white; }
    .rank-3 { background: linear-gradient(135deg, #cd7f32, #a05a2c); color: white; }
    .rank-other { background: var(--bg); color: var(--text-muted); }
    .rank-info { flex: 1; }
    .rank-name { font-size: 1.1rem; font-weight: 700; }
    .rank-members { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .rank-score { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
    .rank-score-label { font-size: .75rem; color: var(--text-muted); text-align: right; }

    /* Score log */
    .log-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .log-table th { background: var(--bg); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-muted); font-size: .8rem; }
    .log-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table tr:hover td { background: #f8faff; }
    .score-positive { color: var(--success); font-weight: 700; }
    .score-negative { color: var(--danger); font-weight: 700; }

    /* Classroom list */
    .classroom-item {
      display: flex; align-items: center; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 8px;
      cursor: pointer; transition: all .15s; background: white;
    }
    .classroom-item:hover { border-color: var(--primary); background: #eef2ff; }
    .classroom-item .classroom-name { flex: 1; font-weight: 600; }
    .classroom-item .classroom-meta { font-size: .8rem; color: var(--text-muted); }

    /* Alert */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: .9rem; font-weight: 500; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error { background: #fee2e2; color: #991b1b; }
    .alert-info { background: #dbeafe; color: #1e40af; }

    /* Badge */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
    .badge-primary { background: #eef2ff; color: var(--primary); }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Empty state */
    .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: .9rem; }

    /* Loading */
    .loading { text-align: center; padding: 20px; color: var(--text-muted); font-size: .9rem; }

    @media (min-width: 600px) {
      .content { padding: 24px; }
      .score-grid { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>🏆 課堂小組競賽加分系統</h1>
  <p>設定課堂 → 即時加分 → 查看排行榜</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('setup')">⚙️ 設定</button>
  <button class="tab-btn" onclick="switchTab('score')">➕ 加分</button>
  <button class="tab-btn" onclick="switchTab('board')">📊 排行榜</button>
</div>

<div class="content">

  <!-- ===== 設定頁 ===== -->
  <div id="tab-setup" class="tab-panel active">
    <div id="setup-alert"></div>

    <div class="card">
      <div class="card-title"><span>🏫</span> 建立新課堂</div>
      <div class="form-group">
        <label>課堂名稱</label>
        <input type="text" id="classroom-name" placeholder="例：113學年度 資訊科技 第一組競賽">
      </div>

      <div class="form-group">
        <label>小組設定</label>
        <div id="groups-container"></div>
        <button class="btn btn-outline btn-sm" onclick="addGroup()">＋ 新增小組</button>
      </div>

      <hr class="divider">
      <button class="btn btn-primary btn-full" onclick="saveClassroom()">💾 儲存課堂設定</button>
    </div>

    <div class="card">
      <div class="card-title"><span>📋</span> 已儲存的課堂</div>
      <div id="classroom-list"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- ===== 加分頁 ===== -->
  <div id="tab-score" class="tab-panel">
    <div id="score-alert"></div>

    <div class="card">
      <div class="card-title"><span>🏫</span> 選擇課堂</div>
      <select id="score-classroom-select" onchange="onScoreClassroomChange()">
        <option value="">── 請選擇課堂 ──</option>
      </select>
    </div>

    <div id="score-form" style="display:none">
      <div class="card">
        <div class="card-title"><span>👥</span> 選擇加分小組</div>
        <div id="score-group-selector" class="group-selector"></div>
      </div>

      <div class="card">
        <div class="card-title"><span>📝</span> 加分設定</div>
        <div class="form-group">
          <label>題目 / 說明</label>
          <input type="text" id="score-topic" placeholder="例：搶答第3題、團隊表現、回答正確">
        </div>
        <div class="form-group">
          <label>分數（快速選擇）</label>
          <div class="score-grid">
            <button class="score-quick-btn" onclick="selectScore(1)">+1</button>
            <button class="score-quick-btn" onclick="selectScore(2)">+2</button>
            <button class="score-quick-btn" onclick="selectScore(3)">+3</button>
            <button class="score-quick-btn" onclick="selectScore(5)">+5</button>
            <button class="score-quick-btn" onclick="selectScore(10)">+10</button>
            <button class="score-quick-btn" onclick="selectScore(-1)">−1</button>
          </div>
        </div>
        <div class="form-group">
          <label>自訂分數</label>
          <input type="number" id="score-value" placeholder="輸入分數（可為負數）" oninput="clearQuickSelect()">
        </div>
        <button class="btn btn-success btn-full" onclick="addScore()" id="add-score-btn">🎯 確認加分</button>
      </div>

      <div class="card">
        <div class="card-title"><span>📜</span> 本次加分記錄（最新10筆）</div>
        <div id="recent-scores"><div class="loading">載入中...</div></div>
      </div>
    </div>
  </div>

  <!-- ===== 排行榜頁 ===== -->
  <div id="tab-board" class="tab-panel">
    <div class="card">
      <div class="card-title"><span>🏫</span> 選擇課堂</div>
      <select id="board-classroom-select" onchange="onBoardClassroomChange()">
        <option value="">── 請選擇課堂 ──</option>
      </select>
    </div>

    <div id="board-content" style="display:none">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span class="badge badge-primary" id="board-classroom-label"></span>
        <button class="btn btn-outline btn-sm" onclick="downloadCSV()">⬇️ 下載統計 CSV</button>
      </div>

      <div id="leaderboard"><div class="loading">載入中...</div></div>

      <div class="card" style="margin-top:16px">
        <div class="card-title"><span>📜</span> 完整加分記錄</div>
        <div id="full-log"><div class="loading">載入中...</div></div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, addDoc, getDocs, doc, deleteDoc,
    query, where, onSnapshot, orderBy, serverTimestamp, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBSsG7H2EHtkh40Ebe-x7xclUyqKMQmobA",
    authDomain: "my-teaching-tools-b010c.firebaseapp.com",
    projectId: "my-teaching-tools-b010c",
    storageBucket: "my-teaching-tools-b010c.firebasestorage.app",
    messagingSenderId: "153618045456",
    appId: "1:153618045456:web:54e36ef3a6cc67f7904895"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ---------- State ----------
  let groupCount = 0;
  let selectedGroupId = null;
  let selectedScore = null;
  let scoreClassroomData = null;
  let boardClassroomData = null;
  let boardUnsubscribe = null;
  let scoreUnsubscribe = null;
  let boardScoreEvents = []; // 快取排行榜資料供下載用

  // ---------- Tab switching ----------
  window.switchTab = (tab) => {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    if (tab === 'score') loadScoreClassrooms();
    if (tab === 'board') loadBoardClassrooms();
  };

  // ==================== SETUP TAB ====================

  window.addGroup = () => {
    groupCount++;
    const container = document.getElementById('groups-container');
    const div = document.createElement('div');
    div.className = 'group-item';
    div.id = `group-${groupCount}`;
    div.innerHTML = `
      <div class="group-header">
        <div class="group-num">${groupCount}</div>
        <input type="text" placeholder="小組名稱，例：第一組" id="gname-${groupCount}">
        <button class="btn btn-danger btn-sm remove-group" onclick="removeGroup(${groupCount})">✕</button>
      </div>
      <div>
        <label>成員名單（每行一人，或逗號分隔）</label>
        <textarea id="gmembers-${groupCount}" placeholder="小明\n小華\n小美"></textarea>
      </div>`;
    container.appendChild(div);
  };

  window.removeGroup = (id) => {
    const el = document.getElementById(`group-${id}`);
    if (el) el.remove();
  };

  // Init with 3 groups
  addGroup(); addGroup(); addGroup();

  window.saveClassroom = async () => {
    const name = document.getElementById('classroom-name').value.trim();
    if (!name) { showAlert('setup-alert', '請輸入課堂名稱', 'error'); return; }

    const groups = [];
    document.querySelectorAll('.group-item').forEach(item => {
      const id = item.id.replace('group-', '');
      const gname = document.getElementById(`gname-${id}`)?.value.trim();
      const gmembers = document.getElementById(`gmembers-${id}`)?.value.trim();
      if (gname) {
        const members = gmembers
          ? gmembers.split(/[\n,，]+/).map(m => m.trim()).filter(Boolean)
          : [];
        groups.push({ id: `g${Date.now()}_${id}`, name: gname, members });
      }
    });

    if (groups.length === 0) { showAlert('setup-alert', '請至少新增一個小組', 'error'); return; }

    try {
      await addDoc(collection(db, 'classrooms'), {
        name, groups, createdAt: serverTimestamp()
      });
      showAlert('setup-alert', `✅ 課堂「${name}」已儲存！`, 'success');
      document.getElementById('classroom-name').value = '';
      loadClassroomList();
    } catch (e) {
      showAlert('setup-alert', '儲存失敗：' + e.message, 'error');
    }
  };

  const loadClassroomList = async () => {
    const container = document.getElementById('classroom-list');
    container.innerHTML = '<div class="loading">載入中...</div>';
    try {
      const snap = await getDocs(collection(db, 'classrooms'));
      if (snap.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>尚無課堂，請先建立</p></div>';
        return;
      }
      // 依 createdAt 降冪排序（JS 端）
      const docs = snap.docs.sort((a, b) =>
        (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0)
      );
      container.innerHTML = '';
      docs.forEach(d => {
        const data = d.data();
        const div = document.createElement('div');
        div.className = 'classroom-item';
        div.innerHTML = `
          <div class="classroom-name">🏫 ${data.name}</div>
          <div class="classroom-meta">${data.groups.length} 組 &nbsp;|&nbsp;
          ${data.groups.reduce((s, g) => s + g.members.length, 0)} 人</div>
          <button class="btn btn-danger btn-sm" style="margin-left:12px" onclick="deleteClassroom('${d.id}', '${data.name.replace(/'/g, "\\'")}')">刪除</button>`;
        container.appendChild(div);
      });
    } catch (e) {
      container.innerHTML = '<div class="alert alert-error">載入失敗：' + e.message + '</div>';
    }
  };

  window.deleteClassroom = async (id, name) => {
    if (!confirm(`確定刪除課堂「${name}」？此操作不可還原。`)) return;
    await deleteDoc(doc(db, 'classrooms', id));
    loadClassroomList();
  };

  loadClassroomList();

  // ==================== SCORE TAB ====================

  const loadScoreClassrooms = async () => {
    const sel = document.getElementById('score-classroom-select');
    sel.innerHTML = '<option value="">── 請選擇課堂 ──</option>';
    const snap = await getDocs(collection(db, 'classrooms'));
    // 依 createdAt 降冪排序（JS 端）
    const docs = snap.docs.sort((a, b) =>
      (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0)
    );
    docs.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.data().name;
      sel.appendChild(opt);
    });
  };

  window.onScoreClassroomChange = async () => {
    const id = document.getElementById('score-classroom-select').value;
    if (!id) { document.getElementById('score-form').style.display = 'none'; return; }

    const snap = await getDoc(doc(db, 'classrooms', id));
    scoreClassroomData = { id: snap.id, ...snap.data() };
    document.getElementById('score-form').style.display = 'block';

    // Render group buttons
    const container = document.getElementById('score-group-selector');
    container.innerHTML = '';
    selectedGroupId = null;
    scoreClassroomData.groups.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'group-select-btn';
      btn.textContent = g.name;
      btn.dataset.gid = g.id;
      btn.onclick = () => {
        container.querySelectorAll('.group-select-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedGroupId = g.id;
      };
      container.appendChild(btn);
    });

    // Load recent scores
    loadRecentScores(id);
  };

  const loadRecentScores = (classroomId) => {
    if (scoreUnsubscribe) scoreUnsubscribe();
    const container = document.getElementById('recent-scores');
    // 只用 where，避免需要複合索引；在 JS 端排序
    const q = query(
      collection(db, 'score_events'),
      where('classroomId', '==', classroomId)
    );
    scoreUnsubscribe = onSnapshot(q, snap => {
      if (snap.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>尚無加分記錄</p></div>';
        return;
      }
      // 依 createdAt 降冪排序，取最新 10 筆
      const sorted = snap.docs
        .map(d => d.data())
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))
        .slice(0, 10);
      const rows = sorted.map(data => {
        const t = data.createdAt?.toDate?.();
        const time = t ? `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}` : '--:--';
        const scoreClass = data.score >= 0 ? 'score-positive' : 'score-negative';
        const scoreText = data.score >= 0 ? `+${data.score}` : `${data.score}`;
        return `<tr>
          <td>${time}</td>
          <td><strong>${data.groupName}</strong></td>
          <td>${data.topic || '—'}</td>
          <td class="${scoreClass}">${scoreText}</td>
        </tr>`;
      }).join('');
      container.innerHTML = `<table class="log-table">
        <thead><tr><th>時間</th><th>小組</th><th>題目</th><th>分數</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }, err => {
      container.innerHTML = `<div class="alert alert-error">載入失敗：${err.message}</div>`;
    });
  };

  window.selectScore = (val) => {
    selectedScore = val;
    document.getElementById('score-value').value = val;
    document.querySelectorAll('.score-quick-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.textContent.replace('−', '-').replace('+', '')) === val);
    });
  };

  window.clearQuickSelect = () => {
    selectedScore = null;
    document.querySelectorAll('.score-quick-btn').forEach(b => b.classList.remove('selected'));
  };

  window.addScore = async () => {
    if (!scoreClassroomData) return;
    if (!selectedGroupId) { showAlert('score-alert', '請選擇加分小組', 'error'); return; }
    const scoreVal = parseInt(document.getElementById('score-value').value);
    if (isNaN(scoreVal) || scoreVal === 0) { showAlert('score-alert', '請輸入有效分數', 'error'); return; }

    const group = scoreClassroomData.groups.find(g => g.id === selectedGroupId);
    const topic = document.getElementById('score-topic').value.trim() || '—';
    const btn = document.getElementById('add-score-btn');
    btn.disabled = true;

    try {
      await addDoc(collection(db, 'score_events'), {
        classroomId: scoreClassroomData.id,
        classroomName: scoreClassroomData.name,
        groupId: group.id,
        groupName: group.name,
        topic,
        score: scoreVal,
        createdAt: serverTimestamp()
      });
      showAlert('score-alert', `✅ 已為「${group.name}」加 ${scoreVal > 0 ? '+' : ''}${scoreVal} 分！`, 'success');
      document.getElementById('score-topic').value = '';
      document.getElementById('score-value').value = '';
      selectedScore = null;
      document.querySelectorAll('.score-quick-btn').forEach(b => b.classList.remove('selected'));
    } catch (e) {
      showAlert('score-alert', '加分失敗：' + e.message, 'error');
    }
    btn.disabled = false;
  };

  // ==================== BOARD TAB ====================

  const loadBoardClassrooms = async () => {
    const sel = document.getElementById('board-classroom-select');
    sel.innerHTML = '<option value="">── 請選擇課堂 ──</option>';
    const snap = await getDocs(collection(db, 'classrooms'));
    // 依 createdAt 降冪排序（JS 端）
    const docs = snap.docs.sort((a, b) =>
      (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0)
    );
    docs.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.data().name;
      sel.appendChild(opt);
    });
  };

  window.onBoardClassroomChange = async () => {
    const id = document.getElementById('board-classroom-select').value;
    if (!id) { document.getElementById('board-content').style.display = 'none'; return; }

    const snap = await getDoc(doc(db, 'classrooms', id));
    boardClassroomData = { id: snap.id, ...snap.data() };
    document.getElementById('board-content').style.display = 'block';
    document.getElementById('board-classroom-label').textContent = boardClassroomData.name;

    if (boardUnsubscribe) boardUnsubscribe();
    // 只用 where，避免需要複合索引；在 JS 端排序
    const q = query(
      collection(db, 'score_events'),
      where('classroomId', '==', id)
    );
    boardUnsubscribe = onSnapshot(q, snap => {
      // 依 createdAt 降冪排序
      boardScoreEvents = snap.docs
        .map(d => d.data())
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      renderLeaderboard(boardScoreEvents);
      renderFullLog(boardScoreEvents);
    }, err => {
      document.getElementById('leaderboard').innerHTML =
        `<div class="alert alert-error">載入失敗：${err.message}</div>`;
      document.getElementById('full-log').innerHTML = '';
    });
  };

  const renderLeaderboard = (events) => {
    const container = document.getElementById('leaderboard');
    if (!boardClassroomData) return;

    // Tally scores
    const totals = {};
    boardClassroomData.groups.forEach(g => { totals[g.id] = { ...g, total: 0 }; });
    events.forEach(e => { if (totals[e.groupId] !== undefined) totals[e.groupId].total += e.score; });

    const sorted = Object.values(totals).sort((a, b) => b.total - a.total);
    if (sorted.every(g => g.total === 0) && events.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">🏁</div><p>尚無加分記錄，開始加分吧！</p></div>';
      return;
    }

    container.innerHTML = sorted.map((g, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      const membersText = g.members?.length ? g.members.join('、') : '（未設定成員）';
      return `<div class="rank-card">
        <div class="rank-badge ${rankClass}">${rankIcon}</div>
        <div class="rank-info">
          <div class="rank-name">${g.name}</div>
          <div class="rank-members">👤 ${membersText}</div>
        </div>
        <div>
          <div class="rank-score">${g.total}</div>
          <div class="rank-score-label">總分</div>
        </div>
      </div>`;
    }).join('');
  };

  const renderFullLog = (events) => {
    const container = document.getElementById('full-log');
    if (events.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>尚無記錄</p></div>';
      return;
    }
    const rows = events.map(data => {
      const t = data.createdAt?.toDate?.();
      const time = t
        ? `${t.getMonth()+1}/${t.getDate()} ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`
        : '--';
      const scoreClass = data.score >= 0 ? 'score-positive' : 'score-negative';
      const scoreText = data.score >= 0 ? `+${data.score}` : `${data.score}`;
      return `<tr>
        <td>${time}</td>
        <td><strong>${data.groupName}</strong></td>
        <td>${data.topic || '—'}</td>
        <td class="${scoreClass}">${scoreText}</td>
      </tr>`;
    }).join('');
    container.innerHTML = `<table class="log-table">
      <thead><tr><th>時間</th><th>小組</th><th>題目</th><th>分數</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  };

  window.downloadCSV = () => {
    if (!boardClassroomData) return;

    // 直接從快取的 boardScoreEvents 計算，不爬 DOM
    const totals = {};
    boardClassroomData.groups.forEach(g => {
      totals[g.id] = { name: g.name, members: (g.members||[]).join('、'), total: 0 };
    });
    boardScoreEvents.forEach(e => {
      if (totals[e.groupId]) totals[e.groupId].total += e.score;
    });
    const sorted = Object.values(totals).sort((a, b) => b.total - a.total);

    // 日期格式 YYYY-MM-DD
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    let csv = '﻿'; // BOM for Excel 正確顯示中文
    csv += `課堂小組競賽統計\n`;
    csv += `課堂名稱,${boardClassroomData.name}\n`;
    csv += `下載日期,${dateStr}\n`;
    csv += `下載時間,${timeStr}\n\n`;

    csv += '=== 排行榜 ===\n名次,小組名稱,成員,總分\n';
    sorted.forEach((g, i) => {
      csv += `${i+1},${g.name},"${g.members}",${g.total}\n`;
    });

    csv += '\n=== 加分記錄 ===\n時間,小組,題目,分數\n';
    boardScoreEvents.forEach(e => {
      const t = e.createdAt?.toDate?.();
      const timeCell = t
        ? `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`
        : '--';
      const scoreText = e.score >= 0 ? `+${e.score}` : `${e.score}`;
      csv += `${timeCell},${e.groupName},"${e.topic || '—'}",${scoreText}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${boardClassroomData.name}_競賽統計_${dateStr}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ==================== UTILS ====================

  function showAlert(containerId, msg, type) {
    const el = document.getElementById(containerId);
    el.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : type === 'success' ? 'success' : 'info'}">${msg}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 3500);
  }

  // Expose for tab switching
  window.db = db;
</script>

</body>
</html>
